{% extends "layout.html" %}
{% set title = "Đăng ký" %}

{% block content %}
<div class="auth-page register-page">
    <div class="auth-panel wide">
        <div class="auth-card-ultra">
            <h2 class="fw-bold">Đăng ký tài khoản bệnh nhân</h2>
            <p class="text-muted">Tài khoản mới mặc định là role User</p>

            <form method="post" class="mt-4">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input name="username" class="form-control form-control-lg" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Họ tên</label>
                        <input name="full_name" class="form-control form-control-lg" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input name="phone" class="form-control form-control-lg" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Địa chỉ nhà</label>
                        <input name="address" class="form-control form-control-lg" required>
                    </div>
                </div>

                <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold">Tạo tài khoản</button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">Đã có tài khoản?</span>
                <a href="{{ url_for('login') }}">Đăng nhập</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
